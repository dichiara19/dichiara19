name: Latest blog post workflow

on:
  schedule:
    - cron: "0 */12 * * *"   # ogni 12 ore
  workflow_dispatch:           # bottone "Run workflow" manuale

permissions:
  contents: write              # serve per committare il README

jobs:
  update-readme-with-blog:
    name: Update README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull in posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://giuseppedichiara.com/rss.xml"
          max_post_count: 5
          template: "- [$title]($url) — _$date_"
          date_format: "mmm d, yyyy"
          commit_message: "chore: update latest blog posts"
